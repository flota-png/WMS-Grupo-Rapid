databases:
  - name: rapidwms-db
    plan: free
    databaseName: rapidwms
    user: rapidwms

services:
  - type: web
    plan: free
    name: rapidwms-pro
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rapidwms-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: EMAIL_FROM
        value: flota@gruporapid.com
      - key: EMAIL_PASS
        sync: false
